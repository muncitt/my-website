<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance – MyKAFA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar__inner">
      <a href="../index.html" class="navbar__logo"><span>🌿</span> MyKAFA</a>
      <ul class="navbar__links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="grades.html">Enter Grades</a></li>
        <li><a href="students.html">Students</a></li>
        <li><a href="../index.html" class="btn-nav">Log Out</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1 class="page-header__title">📅 Mark Attendance</h1>
    <p class="page-header__sub">Kelas 2 Pertengahan – Today's attendance</p>
  </div>

  <div class="page-content">
    <div class="container">

      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
          <div class="form-group" style="margin:0; flex:1; min-width:160px;">
            <label>Date</label>
            <input type="date" id="attendDate" />
          </div>
          <div class="form-group" style="margin:0; flex:1; min-width:160px;">
            <label>Class</label>
            <select>
              <option>Kelas 2 – Pertengahan</option>
              <option>Kelas 1 – Asas</option>
              <option>Kelas 3 – Lanjutan</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="card__title">📅 Attendance Sheet</h2>
        <div class="alert alert--info">
          <span>💡</span>
          <span>Click the status button to toggle between Present ✅, Absent ❌, and Late ⏰.</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No.</th>
                <th>Student Name</th>
                <th>Status</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="attendTable"></tbody>
          </table>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px; flex-wrap:wrap;">
          <button class="btn btn--primary" onclick="saveAttendance()">💾 Save Attendance</button>
          <button class="btn btn--outline" onclick="markAll('present')">✅ Mark All Present</button>
          <button class="btn btn--outline" onclick="window.location.href='dashboard.html'">Cancel</button>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>🌿 MyKAFA – Smart School Management System</p>
    </div>
  </footer>

  <script>
    const students = [
      'Nur Aisyah binti Ahmad',
      'Muhammad Irfan bin Zaki',
      'Siti Hajar binti Razali',
      'Ahmad Faris bin Kamal',
      'Nurul Hana binti Ismail',
      'Izzatul Husna binti Yusof',
      'Mohd Haziq bin Roslan',
      'Fatin Syahirah binti Azmi'
    ];

    const statuses = ['present', 'absent', 'late'];
    const statusDisplay = {
      present: '<span class="badge badge--green">✅ Present</span>',
      absent:  '<span class="badge badge--red">❌ Absent</span>',
      late:    '<span class="badge badge--yellow">⏰ Late</span>'
    };

    // Set today's date
    document.getElementById('attendDate').valueAsDate = new Date();

    const tbody = document.getElementById('attendTable');
    students.forEach((name, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${name}</td>
        <td>
          <button class="btn btn--sm btn--outline" style="min-width:120px;" onclick="toggleStatus(this)" data-status="present">
            ✅ Present
          </button>
        </td>
        <td><input type="text" style="width:100%; padding:6px 10px; border:1.5px solid #c8e6c9; border-radius:8px; font-size:0.85rem;" placeholder="Optional remark" /></td>
      `;
      tbody.appendChild(tr);
    });

    function toggleStatus(btn) {
      const current = btn.dataset.status;
      const next = statuses[(statuses.indexOf(current) + 1) % statuses.length];
      btn.dataset.status = next;
      const labels = { present: '✅ Present', absent: '❌ Absent', late: '⏰ Late' };
      const colors = { present: 'btn--primary', absent: 'btn--outline', late: 'btn--secondary' };
      btn.textContent = labels[next];
      btn.className = `btn btn--sm ${colors[next]}`;
      btn.style.minWidth = '120px';
    }

    function markAll(status) {
      document.querySelectorAll('#attendTable button[data-status]').forEach(btn => {
        btn.dataset.status = status;
        btn.textContent = '✅ Present';
        btn.className = 'btn btn--sm btn--primary';
        btn.style.minWidth = '120px';
      });
    }

    function saveAttendance() {
      alert('✅ Attendance saved successfully!');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
